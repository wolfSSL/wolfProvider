name: OpenSSL Version Tests

on:
  workflow_call:
    inputs:
      wolfssl_refs_json:
        description: "JSON array of wolfssl refs to test; empty = use discover_versions output"
        required: false
        type: string
        default: ""
  workflow_dispatch: {}

jobs:
  discover_versions:
    uses: ./.github/workflows/_discover-versions.yml

  openssl_version_test:
    needs: discover_versions
    name: OpenSSL Version Test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        wolfssl_ref: ${{ inputs.wolfssl_refs_json != '' && fromJson(inputs.wolfssl_refs_json) || fromJson(needs.discover_versions.outputs.wolfssl_latest_ref_array) }}
        openssl_ref: ${{ fromJson(needs.discover_versions.outputs.openssl_all_releases_array) }}
    steps:
      - name: Checkout wolfProvider
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache build dependencies
        id: deps
        uses: ./.github/actions/oras-build-deps
        with:
          variant: osslver
          openssl_ref: ${{ matrix.openssl_ref }}
          wolfssl_ref: ${{ matrix.wolfssl_ref }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test wolfProvider
        run: |
          OPENSSL_TAG=${{ matrix.openssl_ref }} \
          WOLFSSL_TAG=${{ matrix.wolfssl_ref }} \
            ./scripts/build-wolfprovider.sh

      - name: Push build dependencies
        uses: ./.github/actions/oras-build-deps-push
        with:
          registry: ${{ steps.deps.outputs.registry }}
          openssl_install_tag: ${{ steps.deps.outputs.openssl_install_tag }}
          wolfssl_install_tag: ${{ steps.deps.outputs.wolfssl_install_tag }}
          openssl_hit: ${{ steps.deps.outputs.openssl_hit }}
          wolfssl_hit: ${{ steps.deps.outputs.wolfssl_hit }}

      - name: Print errors
        if: ${{ failure() }}
        run: |
          if [ -f test-suite.log ] ; then
            cat test-suite.log
          fi
