  libssh2-591:         { uses: ./.github/workflows/libssh2.yml,         }
  libtss2-591:         { uses: ./.github/workflows/libtss2.yml,         }
  libwebsockets-591:   { uses: ./.github/workflows/libwebsockets.yml,   }
  net-snmp-591:        { uses: ./.github/workflows/net-snmp.yml,        }
  nginx-591:           { uses: ./.github/workflows/nginx.yml,           }
  openldap-591:        { uses: ./.github/workflows/openldap.yml,        }
  opensc-591:          { uses: ./.github/workflows/opensc.yml,          }
  openssh-591:         { uses: ./.github/workflows/openssh.yml,         }
  openssl-version-591: { uses: ./.github/workflows/openssl-version.yml, }
