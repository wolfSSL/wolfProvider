name: Nightly OSP Suite

# Wave 1 = each workflow's default matrix (master + latest discovered
# wolfssl stable). Stays dynamic across version bumps.
# Wave 2 = v5.8.4-stable pinned (back-compat line), gated on wave1-done
# with if: always() so a single Wave 1 failure doesn't skip the
# older-line coverage. multi-compiler and static-analysis run once
# outside the waves.

on:
  # TEMP(testing): run the full OSP suite on push to the test branch so
  # Wave 1 (5.9.1) + Wave 2 (5.8.4) run in CI now instead of waiting for
  # the nightly schedule. REVERT before merge - leave only schedule +
  # workflow_dispatch.
  push:
    branches: [ ci-draft-pause ]
    # TEMP(testing): report-only pushes must not re-trigger the 2-hour suite.
    paths-ignore:
      - '.github/workflows/osp-report.yml'
      - '.github/workflows/nightly-osp.yml'
      - '.github/scripts/osp-triage.py'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are we triggering manually? (annotation only)'
        required: false
        default: 'manual nightly run'

permissions:
  contents: read
  packages: read
  actions: read

concurrency:
  group: nightly-osp
  cancel-in-progress: false

jobs:
  # === Wave 1: v5.9.1-stable ===
  bind9-591:           { uses: ./.github/workflows/bind9.yml,           }
  cjose-591:           { uses: ./.github/workflows/cjose.yml,           }
  curl-591:            { uses: ./.github/workflows/curl.yml,            }
  debian-package-591:  { uses: ./.github/workflows/debian-package.yml,  }
  git-ssh-dr-591:      { uses: ./.github/workflows/git-ssh-dr.yml,      }
  grpc-591:            { uses: ./.github/workflows/grpc.yml,            }
  hostap-591:          { uses: ./.github/workflows/hostap.yml,          }
  iperf-591:           { uses: ./.github/workflows/iperf.yml,           }
  krb5-591:            { uses: ./.github/workflows/krb5.yml,            }
  libcryptsetup-591:   { uses: ./.github/workflows/libcryptsetup.yml,   }
  libeac3-591:         { uses: ./.github/workflows/libeac3.yml,         }
