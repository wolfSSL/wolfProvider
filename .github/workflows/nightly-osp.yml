  # Fan-in between waves. if: always() so Wave 1 failures don't skip Wave 2.
  wave1-done:
    needs:
      - bind9-591
      - cjose-591
      - curl-591
      - debian-package-591
      - git-ssh-dr-591
      - grpc-591
      - hostap-591
      - iperf-591
      - krb5-591
      - libcryptsetup-591
      - libeac3-591
      - libfido2-591
      - libhashkit2-591
      - libnice-591
      - liboauth2-591
      - librelp-591
      - libssh2-591
      - libtss2-591
      - libwebsockets-591
      - net-snmp-591
      - nginx-591
      - openldap-591
      - opensc-591
      - openssh-591
      - openssl-version-591
      - openvpn-591
      - pam-pkcs11-591
      - ppp-591
      - python3-ntp-591
      - qt5network5-591
      - rsync-591
      - socat-591
      - sscep-591
      - sssd-591
      - stunnel-591
      - systemd-591
      - tcpdump-591
      - tnftp-591
      - tpm2-tools-591
      - x11vnc-591
      - xmlsec-591
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: echo "Wave 1 (v5.9.1-stable) complete"

