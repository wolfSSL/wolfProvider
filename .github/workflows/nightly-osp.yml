  tnftp-584:           { needs: wave1-done, if: always(), uses: ./.github/workflows/tnftp.yml,           with: { wolfssl_refs_json: '["v5.8.4-stable"]' } }
  tpm2-tools-584:      { needs: wave1-done, if: always(), uses: ./.github/workflows/tpm2-tools.yml,      with: { wolfssl_refs_json: '["v5.8.4-stable"]' } }
  x11vnc-584:          { needs: wave1-done, if: always(), uses: ./.github/workflows/x11vnc.yml,          with: { wolfssl_refs_json: '["v5.8.4-stable"]' } }
  xmlsec-584:          { needs: wave1-done, if: always(), uses: ./.github/workflows/xmlsec.yml,          with: { wolfssl_refs_json: '["v5.8.4-stable"]' } }

  # === Out-of-wave: not wolfssl-version-split ===
  static-analysis: { uses: ./.github/workflows/static-analysis.yml }
  multi-compiler:  { uses: ./.github/workflows/nightly-multi-compiler.yml }

  notify:
    name: Slack notification
    needs:
      - bind9-591
      - cjose-591
      - curl-591
      - debian-package-591
      - git-ssh-dr-591
      - grpc-591
      - hostap-591
      - iperf-591
      - krb5-591
      - libcryptsetup-591
      - libeac3-591
      - libfido2-591
      - libhashkit2-591
      - libnice-591
      - liboauth2-591
      - librelp-591
      - libssh2-591
      - libtss2-591
      - libwebsockets-591
      - net-snmp-591
      - nginx-591
      - openldap-591
      - opensc-591
      - openssh-591
      - openssl-version-591
      - openvpn-591
      - pam-pkcs11-591
      - ppp-591
      - python3-ntp-591
      - qt5network5-591
      - rsync-591
      - socat-591
      - sscep-591
      - sssd-591
      - stunnel-591
      - systemd-591
      - tcpdump-591
      - tnftp-591
      - tpm2-tools-591
      - x11vnc-591
      - xmlsec-591
      - bind9-584
      - cjose-584
      - curl-584
      - debian-package-584
      - git-ssh-dr-584
      - grpc-584
      - hostap-584
      - iperf-584
      - krb5-584
      - libcryptsetup-584
      - libeac3-584
      - libfido2-584
      - libhashkit2-584
      - libnice-584
      - liboauth2-584
      - librelp-584
      - libssh2-584
      - libtss2-584
      - libwebsockets-584
      - net-snmp-584
      - nginx-584
      - openldap-584
      - opensc-584
      - openssh-584
      - openssl-version-584
      - openvpn-584
      - pam-pkcs11-584
      - ppp-584
      - python3-ntp-584
      - qt5network5-584
      - rsync-584
      - socat-584
      - sscep-584
      - sssd-584
      - stunnel-584
      - systemd-584
      - tcpdump-584
      - tnftp-584
      - tpm2-tools-584
      - x11vnc-584
      - xmlsec-584
      - static-analysis
      - multi-compiler
    if: always()
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Compose summary
        id: summary
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          PASSED=$(echo "$NEEDS_JSON" | jq -r '
            to_entries[]
            | select(.value.result == "success")
            | .key' | sort)
          FAILED=$(echo "$NEEDS_JSON" | jq -r '
            to_entries[]
            | select(.value.result != "success")
            | "\(.key) (\(.value.result))"' | sort)
          PASS_COUNT=$(echo "$PASSED" | awk 'NF{c++} END{print c+0}')
          FAIL_COUNT=$(echo "$FAILED" | awk 'NF{c++} END{print c+0}')
          TOTAL=$((PASS_COUNT + FAIL_COUNT))

          if [ "$FAIL_COUNT" -eq 0 ]; then
            COLOR="good"
            TITLE=":large_green_circle: Nightly OSP: ALL ${TOTAL} PASSED"
            DETAILS="All OSP workflows green for $(date -u +%Y-%m-%d)."
          else
            COLOR="danger"
            TITLE=":red_circle: Nightly OSP: ${FAIL_COUNT} of ${TOTAL} FAILED"
            DETAILS=$'Failed:\n```\n'"${FAILED}"$'\n```'
          fi

          {
            echo "color=$COLOR"
            echo "title<<SUMMARY_EOF"
            echo "$TITLE"
            echo "SUMMARY_EOF"
            echo "details<<SUMMARY_EOF"
            echo "$DETAILS"
            echo "Run: $RUN_URL"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          TITLE: ${{ steps.summary.outputs.title }}
          DETAILS: ${{ steps.summary.outputs.details }}
          COLOR: ${{ steps.summary.outputs.color }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg details "$DETAILS" \
            --arg color "$COLOR" \
            '{
              attachments: [{
                color: $color,
                title: $title,
                text: $details,
                mrkdwn_in: ["text"]
              }]
            }')
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" >/dev/null

      - name: Log to job output (always)
        env:
          TITLE: ${{ steps.summary.outputs.title }}
          DETAILS: ${{ steps.summary.outputs.details }}
        run: |
          {
            echo "## $TITLE"
            echo ""
            echo "$DETAILS"
          } >> "$GITHUB_STEP_SUMMARY"
