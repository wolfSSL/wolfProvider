name: CMake Tests

# START OF COMMON SECTION
on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# END OF COMMON SECTION

jobs:
  build_wolfprovider:
    name: Build wolfProvider with CMake
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        wolfssl_ref: [ 'master', 'v5.7.4-stable' ]
        build_type: [Debug, Release]
    steps:
      - name: Checkout wolfProvider
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build OpenSSL
        run: |
          git clone --depth=1 -b openssl-3.0.9 https://github.com/openssl/openssl.git openssl-source
          cd openssl-source
          ./Configure --prefix=$GITHUB_WORKSPACE/openssl-install
          make -j$(nproc)
          make install_sw

      - name: Build wolfSSL
        run: |
          git clone --depth=1 -b ${{ matrix.wolfssl_ref }} https://github.com/wolfssl/wolfssl.git wolfssl-source
          cd wolfssl-source
          ./autogen.sh
          ./configure --prefix=$GITHUB_WORKSPACE/wolfssl-install --enable-opensslall --enable-opensslextra
          make -j$(nproc)
          make install

      - name: Build wolfProvider with CMake
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/openssl-install;$GITHUB_WORKSPACE/wolfssl-install" \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/wolfprov-install
          ninja
          ninja install

      - name: Test wolfProvider
        run: |
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64:$GITHUB_WORKSPACE/wolfprov-install/lib
          export OPENSSL_CONF=$GITHUB_WORKSPACE/provider.conf
          export OPENSSL_MODULES=$GITHUB_WORKSPACE/wolfprov-install/lib
          cd build
          ninja test
