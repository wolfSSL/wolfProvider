name: Memcached Tests

# START OF COMMON SECTION
on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# END OF COMMON SECTION

jobs:
  build_wolfprovider:
    name: Build wolfProvider
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        wolfssl_ref: [ 'master', 'v5.7.4-stable' ]
    steps:
      - name: Checkout wolfProvider
        uses: actions/checkout@v4

      # Check if this version of wolfssl/wolfprovider has already been built,
      # mark to cache these items on post if we do end up building
      - name: Checking wolfSSL/wolfProvider in cache
        uses: actions/cache@v4
        id: wolfprov-cache
        with:
          path: |
            wolfssl-source
            wolfssl-install
            wolfprov-install
            provider.conf

          key: wolfprov-${{ matrix.wolfssl_ref }}-${{ github.sha }}
          lookup-only: true

      # If wolfssl/wolfprovider have not yet been built, pull ossl from cache
      - name: Checking OpenSSL in cache
        if: steps.wolfprov-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        id: openssl-cache
        with:
          path: |
            openssl-source
            openssl-install

          key: ossl-depends
          fail-on-cache-miss: false

      # If not yet built this version, build it now
      - name: Build wolfProvider
        if: steps.wolfprov-cache.outputs.cache-hit != 'true'
        run: |
          WOLFSSL_TAG=${{ matrix.wolfssl_ref }} ./scripts/build-wolfprovider.sh

      - name: Print errors
        if: ${{ failure() }}
        run: |
          if [ -f test-suite.log ] ; then
            cat test-suite.log
          fi

  test_memcached:
    runs-on: ubuntu-22.04
    needs: build_wolfprovider
    # This should be a safe limit for the tests to run.
    timeout-minutes: 20
    strategy:
      matrix:
        memcached_ref: [ '1.6.22' ]
        wolfssl_ref: [ 'master', 'v5.7.4-stable' ]
    steps:
      - name: Retrieving OpenSSL from cache
        uses: actions/cache/restore@v4
        id: openssl-cache
        with:
          path: |
            openssl-source
            openssl-install

          key: ossl-depends
          fail-on-cache-miss: false

      - name: Retrieving wolfSSL/wolfProvider from cache
        uses: actions/cache/restore@v4
        id: wolfprov-cache
        with:
          path: |
            wolfssl-source
            wolfssl-install
            wolfprov-install
            provider.conf

          key: wolfprov-${{ matrix.wolfssl_ref }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Checkout wolfProvider
        uses: actions/checkout@v4

      - name: Create memcached test script
        run: |
          cat > memcached-test.sh << 'EOF'
          #!/bin/sh
          set -e

          # Set up environment
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64
          export OPENSSL_CONF=$GITHUB_WORKSPACE/provider.conf
          export OPENSSL_MODULES=$GITHUB_WORKSPACE/wolfprov-install/lib

          cd $GITHUB_WORKSPACE/memcached
          make test
          EOF

          chmod +x memcached-test.sh

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y libevent-dev libevent-2.1-7 automake pkg-config make libio-socket-ssl-perl

      - name: Checkout OSP
        uses: actions/checkout@v4
        with:
          repository: wolfssl/osp
          path: osp

      - name: Checkout memcached
        uses: actions/checkout@v4
        with:
          repository: memcached/memcached
          ref: ${{ matrix.memcached_ref }}
          path: memcached

      - name: Configure and build memcached
        run: |
          cd $GITHUB_WORKSPACE/memcached/
          patch -p1 < $GITHUB_WORKSPACE/osp/memcached/memcached_${{ matrix.memcached_ref }}.patch
          ./autogen.sh
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64
          export OPENSSL_CONF=$GITHUB_WORKSPACE/provider.conf
          export OPENSSL_MODULES=$GITHUB_WORKSPACE/wolfprov-install/lib
          PKG_CONFIG_PATH=$GITHUB_WORKSPACE/openssl-install/lib64/pkgconfig ./configure --with-openssl=$GITHUB_WORKSPACE/openssl-install
          make -j$(nproc)

      - name: Confirm memcached built with OpenSSL
        working-directory: ./memcached
        run: |
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64
          ldd memcached | grep -E '(libssl|libcrypto)'

      - name: Run memcached tests
        working-directory: ./memcached
        run: |
          # Retry up to three times
          # Using docker because interrupting the tests doesn't close running
          # background servers. They can become daemonized and then all re-runs
          # will always fail.
          for i in {1..3}; do
            echo "-------- RUNNING TESTS --------"
            MEMCACHED_RES=0 # Not set when command succeeds
            # Tests should usually take less than 4 minutes. If already taking
            # 5 minutes then they are probably stuck. Interrupt and re-run.
            time timeout -s SIGKILL 5m docker run -v /:/host \
              -v $GITHUB_WORKSPACE/memcached-test.sh:/memcached-test.sh \
              -e GITHUB_WORKSPACE=$GITHUB_WORKSPACE \
              -e HOST_ROOT=/host \
              -e LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64 \
              -e OPENSSL_CONF=$GITHUB_WORKSPACE/provider.conf \
              -e OPENSSL_MODULES=$GITHUB_WORKSPACE/wolfprov-install/lib \
              alpine:latest /memcached-test.sh || MEMCACHED_RES=$?

            if [ "$MEMCACHED_RES" -eq "0" ]; then
              break
            fi
          done
          echo "test ran $i times"
          if [ "$MEMCACHED_RES" -ne "0" ]; then
            exit $MEMCACHED_RES
          fi
