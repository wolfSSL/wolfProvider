name: Memcached with wolfProvider

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_wolfprovider:
    name: Build wolfProvider
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        wolfssl_ref: [ 'master', 'v5.7.4-stable' ]
    steps:
      - name: Checkout wolfProvider
        uses: actions/checkout@v4

      # Check if this version of wolfssl/wolfprovider has already been built,
      # mark to cache these items on post if we do end up building
      - name: Checking wolfSSL/wolfProvider in cache
        uses: actions/cache@v4
        id: wolfprov-cache
        with:
          path: |
            wolfssl-source
            wolfssl-install
            wolfprov-install
            provider.conf

          key: wolfprov-${{ matrix.wolfssl_ref }}-${{ github.sha }}
          lookup-only: true

      # If wolfssl/wolfprovider have not yet been built, pull ossl from cache
      - name: Checking OpenSSL in cache
        if: steps.wolfprov-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        id: openssl-cache
        with:
          path: |
            openssl-source
            openssl-install

          key: ossl-depends

      # If not yet built this version, build it now
      - name: Build wolfProvider
        if: steps.wolfprov-cache.outputs.cache-hit != 'true'
        run: |
          WOLFSSL_TAG=${{ matrix.wolfssl_ref }} ./scripts/build-wolfprovider.sh

      - name: Print errors
        if: ${{ failure() }}
        run: |
          if [ -f test-suite.log ] ; then
            cat test-suite.log
          fi

  test_memcached:
    name: Test memcached with wolfProvider
    needs: build_wolfprovider
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      matrix:
        wolfssl_ref: [ 'master', 'v5.7.4-stable' ]
    steps:
      - name: Retrieving OpenSSL from cache
        uses: actions/cache/restore@v4
        id: openssl-cache
        with:
          path: |
            openssl-source
            openssl-install

          key: ossl-depends
          fail-on-cache-miss: true

      # Restore the wolfssl/wolfprovider build from cache
      - name: Restore wolfSSL/wolfProvider from cache
        uses: actions/cache@v4
        id: wolfprov-cache
        with:
          path: |
            wolfssl-source
            wolfssl-install
            wolfprov-install
            provider.conf

          key: wolfprov-${{ matrix.wolfssl_ref }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y libevent-dev libevent-2.1-7 automake pkg-config make libio-socket-ssl-perl

      - name: Checkout OSP
        uses: actions/checkout@v4
        with:
          repository: wolfssl/osp
          path: osp

      - name: Checkout memcached
        uses: actions/checkout@v4
        with:
          repository: memcached/memcached
          ref: 1.6.22
          path: memcached

      - name: Configure and build memcached
        run: |
          cd $GITHUB_WORKSPACE/memcached/
          patch -p1 < $GITHUB_WORKSPACE/osp/memcached/memcached_1.6.22.patch
          ./autogen.sh
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64:$LD_LIBRARY_PATH
          export PKG_CONFIG_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib/pkgconfig
          ./configure --enable-wolfssl
          make -j$(nproc)

      - name: Confirm memcached built with wolfSSL
        working-directory: ./memcached
        run: |
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64:$LD_LIBRARY_PATH
          ldd memcached | grep wolfssl

      - name: Set up test environment
        run: |
          mkdir -p $GITHUB_WORKSPACE/build-dir/bin
          echo '#!/bin/sh
          cd /host/$GITHUB_WORKSPACE/memcached
          export LD_LIBRARY_PATH=/host/$GITHUB_WORKSPACE/wolfssl-install/lib:/host/$GITHUB_WORKSPACE/openssl-install/lib64:$LD_LIBRARY_PATH
          cd t && prove -I/host/$GITHUB_WORKSPACE/memcached/t -I. --timer --formatter=TAP::Formatter::Color --tap --verbose' > $GITHUB_WORKSPACE/build-dir/bin/memcached.sh
          chmod +x $GITHUB_WORKSPACE/build-dir/bin/memcached.sh

      - name: Run memcached tests
        working-directory: ./memcached
        run: |
          # Retry up to three times
          # Using docker because interrupting the tests doesn't close running
          # background servers. They can become daemonized and then all re-runs
          # will always fail.
          for i in {1..3}; do
            echo "-------- RUNNING TESTS --------"
            export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64:$LD_LIBRARY_PATH
            MEMCACHED_RES=0 # Not set when command succeeds
            # Tests should usually take less than 4 minutes. If already taking
            # 5 minutes then they are probably stuck. Interrupt and re-run.
            time timeout -s SIGKILL 5m docker run -v /:/host \
              -v $GITHUB_WORKSPACE/build-dir/bin/memcached.sh:/memcached.sh \
              -e GITHUB_WORKSPACE=$GITHUB_WORKSPACE \
              -e HOST_ROOT=/host \
              -e LD_LIBRARY_PATH=$GITHUB_WORKSPACE/wolfssl-install/lib:$GITHUB_WORKSPACE/openssl-install/lib64:$LD_LIBRARY_PATH \
              alpine:latest /memcached.sh || MEMCACHED_RES=$?

            if [ "$MEMCACHED_RES" -eq "0" ]; then
              break
            fi
          done
          echo "test ran $i times"
          if [ "$MEMCACHED_RES" -ne "0" ]; then
            exit $MEMCACHED_RES
          fi
