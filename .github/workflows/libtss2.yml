name: tpm2-tss Tests


on:
  workflow_call: {}
  workflow_dispatch: {}

jobs:
  discover_versions:
    uses: ./.github/workflows/_discover-versions.yml

  test_tpm2_tss:
    needs: discover_versions
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/wolfssl/wolfprovider-test-deps:bookworm
      env:
        DEBIAN_FRONTEND: noninteractive
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        tpm2_tss_ref: [ '4.1.3']
        wolfssl_ref: ${{ fromJson(needs.discover_versions.outputs.wolfssl_latest_ref_array) }}
        openssl_ref: ${{ fromJson(needs.discover_versions.outputs.openssl_latest_ref_array) }}
        force_fail: ['WOLFPROV_FORCE_FAIL=1', '']
        replace_default: [ true ]
    env:
      WOLFSSL_PACKAGES_PATH: /tmp/wolfssl-packages
      OPENSSL_PACKAGES_PATH: /tmp/openssl-packages
      WOLFPROV_PACKAGES_PATH: /tmp/wolfprov-packages
    steps:
      # Drop stock libssl-dev so tpm2-tss configure picks the
      # wolfssl-built openssl headers.
      - name: Remove stock libssl-dev
        run: |
          if dpkg -l | grep -q libssl-dev; then
            apt-get remove -y libssl-dev
          fi

      - name: Checkout wolfProvider
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build wolfProvider
        run: |
          OPENSSL_TAG=${{ matrix.openssl_ref }} \
          WOLFSSL_TAG=${{ matrix.wolfssl_ref }} \
            ./scripts/build-wolfprovider.sh

      - name: Checkout tpm2-tss
        uses: actions/checkout@v4
        with:
          repository: tpm2-software/tpm2-tss
          path: tpm2_tss_repo
          ref: ${{ matrix.tpm2_tss_ref }}
          fetch-depth: 1

      - name: Checkout OSP
        uses: actions/checkout@v4
        with:
          repository: wolfssl/osp
          path: osp
          fetch-depth: 1
      - run: |
          cd tpm2_tss_repo
          patch -p1 < $GITHUB_WORKSPACE/osp/wolfProvider/libtss2/libtss2-${{ matrix.tpm2_tss_ref }}-wolfprov.patch

      - name: Build and install tpm2-tss
        working-directory: tpm2_tss_repo
        # env-setup uses `source` (bashism); default sh would fail.
        shell: bash
        run: |
          source $GITHUB_WORKSPACE/scripts/env-setup
          ./bootstrap
          ./configure --prefix=$PWD/tpm2-tss-install --with-crypto=ossl \
            --enable-unit
          make -j$(nproc)
          make install

      - name: Run tpm2-tss tests
        working-directory: tpm2_tss_repo
        shell: bash
        run: |
          source $GITHUB_WORKSPACE/scripts/env-setup
          export ${{ matrix.force_fail }}
          make check 2>&1 || true
          if grep -q "FAIL: test/unit" test-suite.log; then
            TEST_RESULT=1
            echo "Expected zero failures"
          else
            TEST_RESULT=0
          fi
          $GITHUB_WORKSPACE/.github/scripts/check-workflow-result.sh $TEST_RESULT ${{ matrix.force_fail }} tpm2-tss
